<!-- Overlay -->
@if(opened()){
<div
    class="fixed inset-0 z-30 bg-black/30 lg:hidden"
    (click)="close.emit()">
</div>
}

<!-- Sidebar -->
<aside
    class="fixed z-40 flex h-screen w-72 flex-col border-r border-slate-200 bg-white transition-all duration-300 lg:static"
    [class.-translate-x-full]="!opened()">

    <!-- Logo -->
    <div class="border-b border-slate-200 px-6 py-6">

        <div class="flex items-center gap-3">

            <div
                class="flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-600 to-purple-600 shadow-lg">

                <span class="text-xl font-bold text-white">
                    W
                </span>

            </div>

            <div>

                <h2 class="text-xl font-bold text-slate-800">
                    WorkFit
                </h2>

                <p class="text-xs text-slate-400">
                    Workforce Platform
                </p>

            </div>

        </div>

    </div>

    <!-- Menu -->
    <nav class="flex-1 px-4 py-6">

        @for(item of menu; track item.route){

        <a
            [routerLink]="item.route"
            routerLinkActive="bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-lg"
            class="group mb-2 flex items-center gap-4 rounded-xl px-4 py-3 font-medium text-slate-600 transition-all duration-300 hover:bg-slate-100 hover:text-indigo-600">

            <i
                [class]="item.icon"
                class="w-5 text-center text-lg transition-colors">
            </i>

            <span>
                {{item.title}}
            </span>

        </a>

        }

    </nav>

    <!-- User -->
    <div class="border-t border-slate-200 p-4">

        <div
            class="flex items-center gap-3 rounded-2xl bg-slate-100 p-3">

            <div
                class="flex h-11 w-11 items-center justify-center rounded-full bg-gradient-to-r from-indigo-600 to-purple-600 font-bold text-white">

                E

            </div>

            <div>

                <h4 class="text-sm font-semibold text-slate-800">
                    Eman Shehata
                </h4>

                <p class="text-xs text-slate-500">
                    Administrator
                </p>

            </div>

        </div>

    </div>

</aside>
